<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cucumell - Iniciar Sesión Administrativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&family=Rye&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
    <div class="login-container">
        <header class="login-header">
            <div class="logo">Cucumell</div>
            <h2>Panel de Administración</h2>
            <p>Ingresa tus credenciales para gestionar productos y precios.</p>
        </header>

        <form id="login-form" class="admin-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="admin@cucumell.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <div class="error-msg" id="error-message"></div>

            <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                <span>Ingresar</span>
                <div class="spinner" id="btn-spinner" style="display: none;"></div>
            </button>
        </form>

        <footer class="login-footer">
            <a href="../" class="back-link">← Volver a la Tienda</a>
        </footer>
    </div>

    <!-- Supabase JS & Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const errorMsg = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');
            const spinner = document.getElementById('btn-spinner');
            const btnText = submitBtn.querySelector('span');

            // Check if Supabase config is set
            const isConfigured = 
                typeof SUPABASE_URL !== 'undefined' && 
                typeof SUPABASE_ANON_KEY !== 'undefined' && 
                SUPABASE_URL.trim() !== "" && 
                SUPABASE_ANON_KEY.trim() !== "" &&
                !SUPABASE_URL.includes("YOUR_SUPABASE");

            if (!isConfigured) {
                errorMsg.innerHTML = '<strong>Alerta de Configuración:</strong><br>El archivo <code>config.js</code> no ha sido configurado con las credenciales de Supabase aún.';
                submitBtn.disabled = true;
                return;
            }

            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Redirect if already logged in
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    window.location.href = 'index.html';
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.textContent = '';
                
                // Show loading
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'inline-block';

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    errorMsg.textContent = 'Credenciales incorrectas. Por favor, verifica tu correo y contraseña.';
                    submitBtn.disabled = false;
                    btnText.style.display = 'inline-block';
                    spinner.style.display = 'none';
                } else {
                    // Success! Redirect to dashboard
                    window.location.href = 'index.html';
                }
            });
        });
    </script>
</body>
</html>
